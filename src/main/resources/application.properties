# ═══════════════════════════════════════════════════════════
#  WhiteFox Backend — Application Properties
#  Override any value via environment variables:
#    DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# ═══════════════════════════════════════════════════════════

# ── Database (PostgreSQL) ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/whitefox}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:whitefoxSuperSecureJwtSecretKey2026@123}

# ── Server ────────────────────────────────────────────────
server.port=8080

# ── Razorpay (optional — for payment integration) ─────────
razorpay.key_id=${RAZORPAY_KEY_ID:YOUR_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}
