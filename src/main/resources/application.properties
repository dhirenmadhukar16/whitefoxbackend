# ═══════════════════════════════════════════════════════════
#  WhiteFox Backend — Application Properties
#  Override any value via environment variables:
#    DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# ═══════════════════════════════════════════════════════════

# ── Database (PostgreSQL) ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/whitefox}
spring.datasource.username=${DB_USERNAME:mahimahi}
spring.datasource.password=${DB_PASSWORD:1234}

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:whitefoxSuperSecureJwtSecretKey2026@123}

# ── Server ────────────────────────────────────────────────
server.port=${PORT:8080}
spring.main.allow-bean-definition-overriding=true

# ── Actuator (health check for cold-start detection) ──────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Razorpay (optional — for payment integration) ─────────
razorpay.key_id=${RAZORPAY_KEY_ID:your_razorpay_key_id}
razorpay.key_secret=${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}

# ── Couchbase (Caching & OTP) ─────────────────────────────
spring.couchbase.connection-string=${COUCHBASE_URL:couchbases://cb.8khjpgxjip31qdb.cloud.couchbase.com}
spring.couchbase.username=${COUCHBASE_USERNAME:your_couchbase_username}
spring.couchbase.password=${COUCHBASE_PASSWORD:your_couchbase_password}
spring.data.couchbase.bucket-name=${COUCHBASE_BUCKET:travel-sample}
